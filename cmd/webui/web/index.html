<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Automation Hub — File Processor</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <header>
        <h1>Automation Hub</h1>
        <p class="sub">Upload a file, run a small processing step, and see the result.</p>
    </header>

    <main>
        <section class="card">
            <h2>Drop a file</h2>

            <div id="dropzone" class="dropzone" tabindex="0" aria-label="File dropzone">
                <div class="dropzone-inner">
                    <div class="big">Drag & drop</div>
                    <div class="small">or</div>
                    <label class="button">
                        Choose file
                        <input id="fileInput" type="file" />
                    </label>
                </div>
            </div>

            <div class="row">
                <button id="uploadBtn" class="primary" disabled>Upload & Process</button>
                <div id="status" class="status"></div>
            </div>
        </section>

        <section class="card">
            <div class="row space">
                <h2>Recent jobs</h2>
                <button id="refreshBtn" class="ghost">Refresh</button>
            </div>
            <div id="jobs" class="jobs"></div>
        </section>

        <section class="card">
            <h2>Selected job details</h2>
            <pre id="jobDetails" class="details">(select a job)</pre>
        </section>
    </main>

    <footer>
        <span>Minimal UI starter — Go backend + vanilla JS</span>
    </footer>

    <script src="/static/app.js"></script>
</body>

</html>
